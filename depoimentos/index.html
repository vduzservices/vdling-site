<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depoimentos | VD Lingvoinstruisto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root { --mint:#b7d7c0; --blue:#5f86d6; --violet:#8b87da; --cream:#f8efe1; --soft:#e7d9f2; --ink:#22161f; --gold:#d8c27a; --shadow:rgba(34,22,31,.14); }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Quicksand',sans-serif; background:radial-gradient(circle at 12% 14%, rgba(183,215,192,.62), transparent 24%),radial-gradient(circle at 84% 12%, rgba(95,134,214,.24), transparent 26%),radial-gradient(circle at 80% 84%, rgba(139,135,218,.20), transparent 28%),linear-gradient(135deg, #deeee5 0%, #d7e3f3 34%, #e4d9f1 68%, #f6edf2 100%); color:var(--ink); min-height:100vh; display:flex; justify-content:center; padding:26px 14px 42px; }
  .page { width:100%; max-width:900px; margin:0 auto; text-align:center; }
  .card { background:linear-gradient(180deg, rgba(248,239,225,.98), rgba(244,235,226,.97)); border:1px solid rgba(95,134,214,.12); border-radius:24px; padding:22px 20px 26px; box-shadow:0 14px 30px rgba(34,22,31,.10); }
  h1 { font-size:2.0rem; margin:0 0 18px; }
  img.deps { width:100%; max-width:820px; border-radius:18px; box-shadow:0 12px 30px rgba(34,22,31,.12); display:block; margin:0 auto 18px; }
  a.back { display:inline-block; margin-top:4px; text-decoration:none; color:#fff; background:linear-gradient(135deg,var(--blue),var(--violet)); padding:10px 18px; border-radius:16px; font-weight:700; }
</style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Depoimentos dos alunos</h1>
      <img class="deps" src="depoimentos/depoimentos-vdling.png" alt="Avaliações reais dos alunos">
      <a class="back" href="https://vdling.vdservices.com.br/">Voltar para a página inicial</a>
    </section>
  </main>
</body>
</html>
