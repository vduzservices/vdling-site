<style>
:root {
  --mint:#b7d7c0;
  --blue:#5f86d6;
  --violet:#8b87da;
  --cream:#f8efe1;
  --cream-2:#f4ebe2;
  --soft:#e7d9f2;
  --ink:#22161f;
  --shadow:rgba(34,22,31,.12);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:'Quicksand',sans-serif;
  background:
    radial-gradient(circle at 12% 14%, rgba(183,215,192,.62), transparent 24%),
    radial-gradient(circle at 84% 12%, rgba(95,134,214,.24), transparent 26%),
    radial-gradient(circle at 80% 84%, rgba(139,135,218,.20), transparent 28%),
    linear-gradient(135deg, #deeee5 0%, #d7e3f3 34%, #e4d9f1 68%, #f6edf2 100%);
  color:var(--ink);
  min-height:100vh;
}
.page{width:min(100%, 1120px);margin:0 auto;padding:24px 14px 42px}
.depo-card{
  background:linear-gradient(180deg, rgba(248,239,225,.98), rgba(244,235,226,.97));
  border:1px solid rgba(95,134,214,.10);
  border-radius:24px;
  box-shadow:0 14px 30px var(--shadow);
  padding:22px 18px 26px;
  text-align:center
}
.depo-card h1{font-size:2rem;margin:0 0 10px}
.subtitle{margin:0 0 18px;line-height:1.6;color:#4c4050;font-size:1.03rem}
.depo-img{width:100%;max-width:820px;border-radius:18px;display:block;margin:0 auto 18px;box-shadow:0 12px 28px rgba(34,22,31,.12)}
.back{display:inline-flex;text-decoration:none;background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff;padding:12px 18px;border-radius:16px;font-weight:700}
@media (max-width:520px){
  .page{padding:18px 12px 34px}
  .depo-card h1{font-size:1.95rem}
}
</style>
</head>
